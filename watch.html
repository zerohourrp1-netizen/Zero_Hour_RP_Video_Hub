<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Watch | Zero Hour RP</title><link rel="stylesheet" href="style.css"></head><body>
<header class="topbar"><div class="topbar-inner">
<a class="brand" href="index.html"><img src="zero-hour-logo.png"><span class="brand-name">ZERO HOUR RP VIDEOS</span></a>
<form class="searchbar" id="searchForm"><input id="searchInput" placeholder="Search Zero Hour RP videos"><button>Search</button></form>
<div class="top-actions"><a class="btn btn-outline desktop-label" data-discord target="_blank">Discord</a><a class="btn btn-red desktop-label" data-fivem target="_blank">Join Server</a><a class="btn hidden" id="dashboardLink" href="dashboard.html">Dashboard</a><button class="btn" id="loginBtn">Staff Login</button><button class="btn hidden" id="logoutBtn">Log Out</button></div>
</div></header>

<main class="public-main" id="watchPage"><div class="watch-layout"><section><video id="videoPlayer" class="player" controls playsinline></video><h1 class="watch-title" id="watchTitle"></h1><div class="muted" id="watchMeta"></div><div class="engagement"><button class="btn" id="likeBtn">👍 Like <span id="likeCount">0</span></button><button class="btn" id="dislikeBtn">👎 Dislike <span id="dislikeCount">0</span></button></div><div class="description" id="watchDescription"></div><h2>Comments</h2><form id="commentForm"><div class="row"><div class="field"><label>Your name</label><input id="commentName" maxlength="60" required></div><div></div></div><div class="field"><label>Comment</label><textarea id="commentBody" maxlength="1500" required></textarea></div><button class="btn btn-red">Post Comment</button></form><div id="commentsList"></div></section><aside><div class="panel-card"><h3>Zero Hour RP</h3><p class="muted">Join our Discord or connect to the FiveM server.</p><div class="actions" style="justify-content:flex-start"><a class="btn btn-red" data-fivem target="_blank">Join Server</a><a class="btn btn-outline" data-discord target="_blank">Discord</a></div></div></aside></div></main>
<footer>© 2026 Zero Hour RP</footer>
<div class="modal hidden" id="loginModal"><div class="modal-box"><h2>Staff Login</h2><div class="notice">Only approved Zero Hour RP staff can upload and manage videos.</div><form id="loginForm"><div class="field"><label>Email</label><input type="email" id="loginEmail" required></div><div class="field"><label>Password</label><input type="password" id="loginPassword" required></div><div class="actions"><button type="button" class="btn" id="closeLogin">Cancel</button><button class="btn btn-red">Sign In</button></div></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="app.js"></script></body></html>
